# .github/workflows/ci.yml
name: CI — Tests & Linting

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  # ── Backend Tests ──────────────────────────────────────────────
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create dummy ML models
        run: |
          mkdir -p ml/models
          python -c "
          import joblib, os
          from ml.forecaster import SimpleForecaster

          # Dummy categoriser
          from sklearn.pipeline import Pipeline
          from sklearn.feature_extraction.text import TfidfVectorizer
          from sklearn.linear_model import LogisticRegression
          model = Pipeline([
              ('tfidf', TfidfVectorizer()),
              ('clf', LogisticRegression(max_iter=10))
          ])
          model.fit(['test transaction'], ['Other'])
          joblib.dump({
              'model': model,
              'categories': ['Other', 'Groceries', 'Dining Out'],
              'version': '1.0.0',
              'accuracy': 0.72,
          }, 'ml/models/categoriser.pkl')

          # Dummy anomaly detector
          from sklearn.ensemble import IsolationForest
          from sklearn.preprocessing import StandardScaler
          import numpy as np
          X = np.random.randn(100, 6)
          scaler = StandardScaler()
          X_scaled = scaler.fit_transform(X)
          iso = IsolationForest(n_estimators=10, random_state=42)
          iso.fit(X_scaled)
          joblib.dump({
              'iso_forest': iso,
              'scaler': scaler,
              'version': '1.0.0',
              'anomaly_threshold': 0.5,
          }, 'ml/models/anomaly_detector.pkl')

          # Dummy forecaster
          forecaster = SimpleForecaster()
          joblib.dump({
              'forecaster': forecaster,
              'categories': [],
              'version': '1.0.0',
          }, 'ml/models/spending_predictor.pkl')
          print('Dummy models created!')
          "

      - name: Run tests
        working-directory: backend
        env:
          SECRET_KEY: test-secret-key-for-ci-only
          ENVIRONMENT: test
          GROQ_API_KEY: test-key
          LLM_PROVIDER: groq
        run: |
          pytest --no-cov -v --tb=short

      - name: Run tests with coverage
        working-directory: backend
        env:
          SECRET_KEY: test-secret-key-for-ci-only
          ENVIRONMENT: test
        run: |
          pytest --cov=app --cov-report=xml --cov-fail-under=70

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml
          fail_ci_if_error: false

  # ── Frontend Build ─────────────────────────────────────────────
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build
        working-directory: frontend
        env:
          VITE_API_URL: http://localhost:8000
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  # ── Security Scan ──────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install bandit
        run: pip install bandit

      - name: Run security scan
        working-directory: backend
        run: |
          bandit -r app/ -ll --exit-zero